<svg viewBox="0 0 400 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Mamy's Hair Braiding logo — light variant">
  <defs>
    <linearGradient id="tineGradL" x1="0" y1="0" x2="0" y2="1">
