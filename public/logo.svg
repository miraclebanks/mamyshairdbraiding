<svg viewBox="0 0 400 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Mamy's Hair Braiding logo">
  <defs>
    <!-- Main gradient: light terra to deep terra -->
    <linearGradient id="tineGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D9845A"/>
      <stop offset="60%" stop-color="#C4622D"/>
      <stop offset="100%" stop-color="#8B3A15"/>
    </linearGradient>

    <!-- Subtle shimmer for band -->
    <linearGradient id="bandGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#8B3A15"/>
      <stop offset="20%"  stop-color="#C4622D"/>
      <stop offset="50%"  stop-color="#E07040"/>
      <stop offset="80%"  stop-color="#C4622D"/>
      <stop offset="100%" stop-color="#8B3A15"/>
    </linearGradient>

    <!-- Clip for braid band -->
    <clipPath id="bandClip">
      <rect x="72" y="265" width="256" height="30" rx="5"/>
    </clipPath>
  </defs>

  <!-- ─── HANDLE ─────────────────────────────────── -->
  <rect x="191" y="295" width="18" height="120" rx="9" fill="url(#tineGrad)"/>
  <!-- Handle end knob -->
  <ellipse cx="200" cy="418" rx="14" ry="8" fill="#8B3A15"/>
  <ellipse cx="200" cy="416" rx="10" ry="5" fill="#C4622D"/>

  <!-- ─── THREE TINES ────────────────────────────── -->

  <!-- Left tine -->
  <path d="M 88 272 L 108 272 L 104 118 L 98 96 L 92 118 Z"
        fill="url(#tineGrad)"/>
  <!-- Left tip: spear point -->
  <polygon points="98,78  108,97  98,102  88,97"
           fill="#C4622D"/>
  <polygon points="98,68  102,80  98,82  94,80"
           fill="#D9845A"/>

  <!-- Center tine (tallest) -->
  <path d="M 189 272 L 211 272 L 207 100 L 200 75 L 193 100 Z"
        fill="url(#tineGrad)"/>
  <!-- Center tip: spear point -->
  <polygon points="200,56  212,76  200,81  188,76"
           fill="#C4622D"/>
  <polygon points="200,44  205,58  200,61  195,58"
           fill="#D9845A"/>

  <!-- Right tine -->
  <path d="M 292 272 L 312 272 L 308 118 L 302 96 L 296 118 Z"
        fill="url(#tineGrad)"/>
  <!-- Right tip: spear point -->
  <polygon points="302,78  312,97  302,102  292,97"
           fill="#C4622D"/>
  <polygon points="302,68  306,80  302,82  298,80"
           fill="#D9845A"/>

  <!-- ─── CROSSBAR ───────────────────────────────── -->
  <path d="M 72 272 Q 200 262 328 272 L 328 288 Q 200 278 72 288 Z"
        fill="url(#bandGrad)"/>
  <!-- Crossbar end caps -->
  <ellipse cx="72"  cy="280" rx="10" ry="10" fill="#8B3A15"/>
  <ellipse cx="72"  cy="280" rx="6"  ry="6"  fill="#C4622D"/>
  <ellipse cx="328" cy="280" rx="10" ry="10" fill="#8B3A15"/>
  <ellipse cx="328" cy="280" rx="6"  ry="6"  fill="#C4622D"/>

  <!-- ─── BRAID BAND on crossbar ─────────────────── -->
  <!-- Background of band -->
  <rect x="72" y="265" width="256" height="30" rx="5" fill="#C4622D" clip-path="url(#bandClip)"/>
  <!-- Woven diagonal stripes — left-leaning -->
  <g clip-path="url(#bandClip)" opacity="0.45">
    <line x1="76"  y1="260" x2="60"  y2="300" stroke="#8B3A15" stroke-width="5"/>
    <line x1="92"  y1="260" x2="76"  y2="300" stroke="#8B3A15" stroke-width="5"/>
    <line x1="108" y1="260" x2="92"  y2="300" stroke="#8B3A15" stroke-width="5"/>
    <line x1="124" y1="260" x2="108" y2="300" stroke="#8B3A15" stroke-width="5"/>
    <line x1="140" y1="260" x2="124" y2="300" stroke="#8B3A15" stroke-width="5"/>
    <line x1="156" y1="260" x2="140" y2="300" stroke="#8B3A15" stroke-width="5"/>
    <line x1="172" y1="260" x2="156" y2="300" stroke="#8B3A15" stroke-width="5"/>
    <line x1="188" y1="260" x2="172" y2="300" stroke="#8B3A15" stroke-width="5"/>
    <line x1="204" y1="260" x2="188" y2="300" stroke="#8B3A15" stroke-width="5"/>
    <line x1="220" y1="260" x2="204" y2="300" stroke="#8B3A15" stroke-width="5"/>
    <line x1="236" y1="260" x2="220" y2="300" stroke="#8B3A15" stroke-width="5"/>
    <line x1="252" y1="260" x2="236" y2="300" stroke="#8B3A15" stroke-width="5"/>
    <line x1="268" y1="260" x2="252" y2="300" stroke="#8B3A15" stroke-width="5"/>
    <line x1="284" y1="260" x2="268" y2="300" stroke="#8B3A15" stroke-width="5"/>
    <line x1="300" y1="260" x2="284" y2="300" stroke="#8B3A15" stroke-width="5"/>
    <line x1="316" y1="260" x2="300" y2="300" stroke="#8B3A15" stroke-width="5"/>
    <line x1="332" y1="260" x2="316" y2="300" stroke="#8B3A15" stroke-width="5"/>
  </g>
  <!-- Woven diagonal stripes — right-leaning (creates the weave) -->
  <g clip-path="url(#bandClip)" opacity="0.3">
    <line x1="60"  y1="260" x2="76"  y2="300" stroke="#F5E0D4" stroke-width="5"/>
    <line x1="76"  y1="260" x2="92"  y2="300" stroke="#F5E0D4" stroke-width="5"/>
    <line x1="92"  y1="260" x2="108" y2="300" stroke="#F5E0D4" stroke-width="5"/>
    <line x1="108" y1="260" x2="124" y2="300" stroke="#F5E0D4" stroke-width="5"/>
    <line x1="124" y1="260" x2="140" y2="300" stroke="#F5E0D4" stroke-width="5"/>
    <line x1="140" y1="260" x2="156" y2="300" stroke="#F5E0D4" stroke-width="5"/>
    <line x1="156" y1="260" x2="172" y2="300" stroke="#F5E0D4" stroke-width="5"/>
    <line x1="172" y1="260" x2="188" y2="300" stroke="#F5E0D4" stroke-width="5"/>
    <line x1="188" y1="260" x2="204" y2="300" stroke="#F5E0D4" stroke-width="5"/>
    <line x1="204" y1="260" x2="220" y2="300" stroke="#F5E0D4" stroke-width="5"/>
    <line x1="220" y1="260" x2="236" y2="300" stroke="#F5E0D4" stroke-width="5"/>
    <line x1="236" y1="260" x2="252" y2="300" stroke="#F5E0D4" stroke-width="5"/>
    <line x1="252" y1="260" x2="268" y2="300" stroke="#F5E0D4" stroke-width="5"/>
    <line x1="268" y1="260" x2="284" y2="300" stroke="#F5E0D4" stroke-width="5"/>
    <line x1="284" y1="260" x2="300" y2="300" stroke="#F5E0D4" stroke-width="5"/>
    <line x1="300" y1="260" x2="316" y2="300" stroke="#F5E0D4" stroke-width="5"/>
    <line x1="316" y1="260" x2="332" y2="300" stroke="#F5E0D4" stroke-width="5"/>
  </g>
  <!-- Band outline for crispness -->
  <rect x="72" y="265" width="256" height="30" rx="5"
        fill="none" stroke="#8B3A15" stroke-width="1.5"/>

  <!-- ─── WORDMARK ───────────────────────────────── -->

  <!-- MAMY'S -->
  <text x="200" y="456"
        text-anchor="middle"
        font-family="Cormorant Garamond, Georgia, serif"
        font-size="58"
        font-weight="300"
        letter-spacing="5"
        fill="#1E0A06">MAMY&#x2019;S</text>

  <!-- Thin gold divider -->
  <line x1="110" y1="466" x2="290" y2="466"
        stroke="#C4622D" stroke-width="1" opacity="0.7"/>

  <!-- HAIR BRAIDING -->
  <text x="200" y="488"
        text-anchor="middle"
        font-family="Inter, system-ui, sans-serif"
        font-size="12"
        font-weight="600"
        letter-spacing="7"
        fill="#C4622D">HAIR BRAIDING</text>
</svg>
